<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Strategy | Vinhomes Hải Vân Bay</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="vh-master-wrapper">
        <aside class="vh-config-sidebar">
            <div class="sidebar-inner">
                <h2 class="sidebar-title">Thiết lập thông số</h2>
                <div class="input-item">
                    <label>Giá trị BĐS (Tỷ VNĐ)</label>
                    <input type="number" id="basePrice" value="12.5" step="0.1">
                </div>
                <div class="input-item">
                    <label>Phương thức thanh toán</label>
                    <select id="paymentMethod">
                        <option value="vay70">Vay 70% (HTLS 0%)</option>
                        <option value="tts">Thanh toán sớm (CK 7.5%)</option>
                        <option value="td">Tiến độ chuẩn</option>
                    </select>
                </div>
                <div class="input-item">
                    <label>Kỳ vọng tăng giá: <span id="growthVal">12</span>%</label>
                    <input type="range" id="growthRate" min="5" max="25" value="12"
                        oninput="document.getElementById('growthVal').innerText=this.value">
                </div>

                <nav class="step-nav">
                    <button class="btn-step-trigger active-btn" onclick="runStep(1)">1. PHÂN TÍCH DÒNG TIỀN</button>
                    <button class="btn-step-trigger btn-disabled" id="btn-step-2" onclick="runStep(2)" disabled>2. PHÂN
                        TÍCH LỢI NHUẬN</button>
                    <button class="btn-step-trigger btn-disabled" id="btn-step-3" onclick="runStep(3)" disabled>3. TỔNG
                        KẾT CHIẾN LƯỢC</button>
                </nav>
            </div>
        </aside>

        <main class="vh-stage">
            <header class="stage-header">
                <p class="brand-sub">LUXURY INVESTMENT REPORT</p>
                <h1 class="brand-main">Vinhomes Hải Vân Bay</h1>
            </header>

            <div id="analysis-flow">
                <section id="step-1" class="step-card-hidden">
                    <div class="step-grid">
                        <div class="analysis-text">
                            <span class="step-number">01</span>
                            <h2 class="step-title">Tối ưu hóa <br>Dòng vốn đầu tư</h2>
                            <div class="insight-content" id="cfInsight"></div>
                        </div>
                        <div class="chart-outer glass-effect">
                            <div class="chart-container">
                                <canvas id="cashflowChart"></canvas>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="step-2" class="step-card-hidden">
                    <div class="step-grid">
                        <div class="analysis-text">
                            <span class="step-number">02</span>
                            <h2 class="step-title">Kỳ vọng <br>Thặng dư tài sản</h2>
                            <div class="insight-content" id="roiInsight"></div>
                        </div>
                        <div class="chart-outer glass-effect">
                            <div class="chart-container">
                                <canvas id="roiChart"></canvas>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="step-3" class="step-card-hidden">
                    <div class="final-conclusion-card glass-effect">
                        <h2 class="final-title">KẾT LUẬN CHIẾN LƯỢC</h2>
                        <div id="finalContent" class="final-body"></div>
                        <div class="signature">
                            <p>Tư vấn bởi Chuyên viên</p>
                            <h3>LÊ QUANG DŨNG</h3>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
